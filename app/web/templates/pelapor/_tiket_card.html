{# app/web/templates/pelapor/_tiket_card.html #}
<div style="margin-top: 12px; margin-left: 0; max-width: 80%;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border: 2px solid #22c55e;
            border-radius: 14px; padding: 18px;
            box-shadow: 0 4px 16px rgba(22,163,74,.15);">

  <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
    <span style="font-size:18px;">🎫</span>
    <span style="font-size:11px; color:#16a34a; text-transform:uppercase;
                 font-weight:800; letter-spacing:.7px;">Tiket Berhasil Dibuat</span>
  </div>

  <p style="font-family: monospace; font-size: 20px; font-weight: 800;
             color: #14532d; margin: 0 0 14px;
             letter-spacing: .5px;">{{ ticket_id }}</p>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px;">
    <div style="background: rgba(255,255,255,.7); border-radius: 8px; padding: 8px 10px;
                border: 1px solid #bbf7d0;">
      <div style="font-size: 10px; color: #4b7a56; text-transform:uppercase;
                  letter-spacing:.5px; margin-bottom:3px;">Jenis</div>
      <div style="font-size: 13px; font-weight: 700; color: #14532d;">{{ incident_type or "—" }}</div>
    </div>
    <div style="background: rgba(255,255,255,.7); border-radius: 8px; padding: 8px 10px;
                border: 1px solid #bbf7d0;">
      <div style="font-size: 10px; color: #4b7a56; text-transform:uppercase;
                  letter-spacing:.5px; margin-bottom:3px;">Severity</div>
      <div style="font-size: 13px; font-weight: 700; color: #14532d;">{{ severity or "—" }}</div>
    </div>
    <div style="background: rgba(255,255,255,.7); border-radius: 8px; padding: 8px 10px;
                border: 1px solid #bbf7d0;">
      <div style="font-size: 10px; color: #4b7a56; text-transform:uppercase;
                  letter-spacing:.5px; margin-bottom:3px;">Eskalasi</div>
      <div style="font-size: 13px; font-weight: 700; color: #14532d;">{{ escalation_level or "—" }}</div>
    </div>
    <div style="background: rgba(255,255,255,.7); border-radius: 8px; padding: 8px 10px;
                border: 1px solid #bbf7d0;">
      <div style="font-size: 10px; color: #4b7a56; text-transform:uppercase;
                  letter-spacing:.5px; margin-bottom:3px;">Confidence</div>
      <div style="font-size: 13px; font-weight: 700; color: #14532d;">
        {{ "%.0f"|format(confidence_score * 100) }}%
      </div>
    </div>
  </div>

  <a href="/lapor/tiket/{{ ticket_id }}" target="_blank" rel="noopener"
     style="display: flex; align-items: center; justify-content: space-between;
            padding: 9px 14px;
            background: linear-gradient(135deg, #16a34a, #15803d);
            color: white; text-decoration: none;
            border-radius: 8px; font-size: 13px; font-weight: 600;
            box-shadow: 0 2px 8px rgba(22,163,74,.35);
            transition: box-shadow .15s;">
    <span>Lihat Status Tiket</span>
    <span>→</span>
  </a>
</div>
